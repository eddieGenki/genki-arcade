<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- PWA icons. /favicon.png is the 2925-square original; the /icons/*
         PNGs are downscaled variants generated from it at build prep time.
         Browsers / iOS Safari pick the closest size match automatically. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- Onest (display) + Inter (body) — fallbacks for Nekst + Suisse Int'l, per design spec. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Genki Arcade</title>

    <!-- Capture beforeinstallprompt before any module code runs.
         Chrome fires this event exactly once per page load, asynchronously,
         after the SW registers + installability checks pass. If it fires
         while React is still booting (common on first visit, when caches
         are cold), the React hook attaches its listener too late and the
         event is lost for the session — that's why the install button
         used to need a reload to appear.

         This inline script attaches the listener synchronously at HTML
         parse time, stashes the event on window.__pwaInstallEvent, and
         dispatches a 'pwa-install-ready' event so any late-mounting hook
         can react. The hook also reads window.__pwaInstallEvent on
         mount as a belt-and-suspenders for the same-tick case. -->
    <script>
      (function () {
        window.__pwaInstallEvent = null;
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          window.__pwaInstallEvent = e;
          window.dispatchEvent(new Event('pwa-install-ready'));
        });
        window.addEventListener('appinstalled', function () {
          window.__pwaInstallEvent = null;
          window.dispatchEvent(new Event('pwa-installed'));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
